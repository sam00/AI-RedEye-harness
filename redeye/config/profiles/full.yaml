# Full profile -- multi-backend layout.
#
# Discovery stages run on a cheap model via the `sdk` backend; deep
# research runs through the `cli` backend; adversarial review and one of
# the voters use the `openai` backend so a different model family votes
# against the rest (genuinely independent voters).
#
# Cost expectations are higher than `default` but voting kills more FPs.

name: full

roles:
  surveyor:
    via: sdk
    model: claude-haiku-4-5-20251001
    temperature: 0.0
    max_tokens: 4096
  researcher:
    via: cli
    model: claude-sonnet-5
    max_tokens: 8192
    extra: { tools: [Read, Glob, Grep, Bash] }
  adversary_a:
    via: sdk
    model: claude-sonnet-5
    temperature: 0.2
    max_tokens: 8192
  adversary_b:
    via: openai
    model: gpt-4o
    temperature: 0.2
    max_tokens: 8192
  reporter:
    via: sdk
    model: claude-haiku-4-5-20251001
    temperature: 0.0
    max_tokens: 4096
  validator:
    # Cheap, fast model for the single-pass S6.5 TP/FP gate.
    via: sdk
    model: claude-haiku-4-5-20251001
    temperature: 0.0
    max_tokens: 1024

stages:
  s1_attack_surface:
    skill: attack_surface_mapper
    role: surveyor
    max_budget_usd: 0.40
    params:
      # Repo intake / file-inventory controls (CLI flags still override).
      exclude_dirs: [migrations, generated, fixtures]
      exclude_exts: [.min.js, .lock, .map]
      exclude_globs: ["**/*.snap", "**/testdata/**"]
      max_file_kb: 512          # skip files larger than 512 KB
      follow_symlinks: false    # do not traverse symlinks
      dedupe_configs: true      # collapse byte-identical config files
  s1b_structural:
    # Deterministic regex/AST pre-index. Zero LLM cost; massive precision lift.
    skill: structural_index
    role: surveyor
    max_budget_usd: 0.0
    params:
      # Fold third-party scanner reports into the structural map. Accepts
      # SARIF / Semgrep / Trivy / Bandit / Gitleaks / Grype / generic JSON.
      # Imported locations are mapping enrichment -- they still face
      # grounding/voting/verification, are deduped against native sinks at the
      # same file:line, and flagged reachable when co-located with a source.
      external_scanners: []
      # e.g. [./reports/semgrep.json, ./reports/codeql.sarif]
      # Cap cross-file taint flows from the lightweight Python call graph.
      max_cross_file_flows: 50
  s2_threat_model:
    skill: threat_modeler
    role: surveyor
    max_budget_usd: 0.40
    params:
      enabled: true
      max_threats: 25           # cap emitted STRIDE entries
      baseline: null            # path to accepted-threat signatures (category|asset)
      max_document_chars: 6000  # cap the attack-surface doc fed to the model
      # Evidence caps -- how much structural context is injected:
      max_modules: 40
      max_entry_points: 40
      max_config_reps: 20
      max_api_artifacts: 40
  s3_strategize:
    skill: research_strategist
    role: researcher
    max_budget_usd: 0.50
  s4_research:
    skill: research_lenses
    role: researcher
    max_budget_usd: 6.00
    params:
      lenses: [language, crypto, logic, access_control, iac]
  s4b_grounding:
    # Verify every cited file:line against the actual source. No LLM.
    # In strict mode (set via --strict-grounding), hallucinated paths are
    # dropped instead of merely tagged.
    skill: grounding_pass
    role: surveyor
    max_budget_usd: 0.0
    params:
      strict: false
  s5_policy_gate:
    skill: policy_gate
    role: surveyor
    max_budget_usd: 0.20
  s6_adversarial:
    skill: adversarial_reviewer
    role: adversary_a
    max_budget_usd: 4.00
  s6b_validator:
    skill: validator
    role: validator
    max_budget_usd: 0.50
  s7_dedupe:
    skill: dedupe
    role: reporter
    max_budget_usd: 0.10
  s8_chain:
    skill: exploit_strategist
    role: reporter
    max_budget_usd: 1.50
  s8b_poc:
    # Demand a concrete exploit string. Findings without one get demoted by
    # one severity notch (or dropped under --require-poc).
    skill: poc_gate
    role: validator      # cheap Haiku-class model is enough
    max_budget_usd: 1.00
    params:
      strict: false
  s8c_verify:
    # Deterministic K-of-N outcome verification. No LLM cost. Flags findings
    # that don't clear the bar (or drops them under --require-verified).
    skill: outcome_verifier
    role: validator
    max_budget_usd: 0.00
    params:
      threshold: 3
      strict: false
  s9_emit:
    skill: emit
    role: reporter
    max_budget_usd: 0.10

voting:
  enabled: true
  quorum: 2
  voters: [adversary_a, adversary_b, researcher]
