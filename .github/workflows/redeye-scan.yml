name: redeye

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile (default | cli | full | mock | <path>)"
        required: false
        default: "full"
      target:
        description: "Path inside the repo to scan (defaults to repo root)"
        required: false
        default: "."
  issue_comment:
    types: [edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  REDEYE_DB_PATH: .redeye/scans.db
  REDEYE_FEEDBACK_CACHE_KEY: redeye-feedback-v1-${{ github.repository }}

jobs:
  pr-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for git diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore feedback store
        uses: actions/cache@v4
        with:
          path: .redeye/scans.db
          key: ${{ env.REDEYE_FEEDBACK_CACHE_KEY }}
          restore-keys: |
            redeye-feedback-v1-

      - name: Install redeye
        run: |
          pip install --upgrade pip
          pip install .

      - name: Doctor
        env:
          REDEYE_PROFILE: ${{ vars.REDEYE_PROFILE || 'mock' }}
        run: redeye doctor --no-network

      - name: PR scan (diff-only)
        env:
          REDEYE_PROFILE: ${{ vars.REDEYE_PROFILE || 'mock' }}
          # Optional backends: set the corresponding repo secrets.
          ANTHROPIC_SDK_API_KEY: ${{ secrets.ANTHROPIC_SDK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          REDEYE_WEBHOOK_URL: ${{ secrets.REDEYE_WEBHOOK_URL }}
          REDEYE_WEBHOOK_TYPE: ${{ vars.REDEYE_WEBHOOK_TYPE || 'slack' }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          # Never expand `${{ }}` inside `run:` -- pass via env instead.
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS" ]; then
            printf '%s\n' "$GOOGLE_CREDENTIALS" > "$GOOGLE_APPLICATION_CREDENTIALS"
          fi
          mkdir -p out .redeye
          redeye scan \
            --repo . \
            --preset pr \
            --pr-base "origin/${PR_BASE_REF}" \
            --output-dir ./out \
            --pr-comment ./out/pr-comment.md \
            ${REDEYE_WEBHOOK_URL:+--webhook-url "$REDEYE_WEBHOOK_URL" --webhook-type "$REDEYE_WEBHOOK_TYPE"}

      - name: Post PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -f ./out/pr-comment.md ]; then
            gh pr comment "$PR_NUMBER" --body-file ./out/pr-comment.md
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-scan-pr-${{ github.event.pull_request.number }}
          path: out/

  full-scan:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install .
      - run: redeye doctor --no-network
      - name: Full scan
        env:
          ANTHROPIC_SDK_API_KEY: ${{ secrets.ANTHROPIC_SDK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          REDEYE_WEBHOOK_URL: ${{ secrets.REDEYE_WEBHOOK_URL }}
          REDEYE_WEBHOOK_TYPE: ${{ vars.REDEYE_WEBHOOK_TYPE || 'slack' }}
          # Never expand `${{ }}` inside `run:` -- pass via env instead.
          SCAN_TARGET: ${{ github.event.inputs.target || '.' }}
          SCAN_PROFILE: ${{ github.event.inputs.profile || 'full' }}
        run: |
          redeye scan \
            --repo "$SCAN_TARGET" \
            --profile "$SCAN_PROFILE" \
            --output-dir ./out \
            --store-findings \
            ${REDEYE_WEBHOOK_URL:+--webhook-url "$REDEYE_WEBHOOK_URL" --webhook-type "$REDEYE_WEBHOOK_TYPE"}

      - uses: actions/upload-artifact@v4
        with:
          name: redteam-full-scan-${{ github.run_id }}
          path: out/

  collect-feedback:
    # Triggered when a reviewer ticks a TP/FP box in a PR comment.
    if: github.event_name == 'issue_comment' && github.event.action == 'edited' && github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore feedback store
        uses: actions/cache@v4
        with:
          path: .redeye/scans.db
          key: ${{ env.REDEYE_FEEDBACK_CACHE_KEY }}
          restore-keys: |
            redeye-feedback-v1-
      - run: pip install .
      - name: Persist verdicts
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          mkdir -p .redeye
          python3 -c "import os, pathlib; pathlib.Path('/tmp/comment.md').write_text(os.environ['COMMENT_BODY'])"
          redeye collect-feedback --comment-file /tmp/comment.md
