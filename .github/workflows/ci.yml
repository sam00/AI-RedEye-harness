name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check
        run: mypy redeye || true   # advisory; tighten over time

      - name: Test
        run: pytest --cov=redeye --cov-report=xml

      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  smoke:
    name: end-to-end smoke (mock backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: redeye --version
      - run: redeye doctor --profile mock --no-network
      - run: redeye estimate --repo . --profile mock
      - run: redeye scan --repo . --profile mock --output-dir ./out
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-output
          path: out/
